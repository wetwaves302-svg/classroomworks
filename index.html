<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電機二乙 班級系統</title>
<style>
:root{
  --primary:#315f8f;
  --primary-dark:#23496f;
  --primary-light:#eaf2f8;
  --bg:#eef3f8;
  --card:#ffffff;
  --text:#203247;
  --muted:#65758a;
  --border:#d8e1eb;
  --radius:16px;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:"Microsoft JhengHei","PingFang TC","Noto Sans TC",sans-serif;background:var(--bg);color:var(--text)}
header{
  background:linear-gradient(135deg,var(--primary-dark),#4d84b8);
  color:#fff;padding:22px 16px 18px;
  position:sticky;top:0;z-index:20;
  box-shadow:0 2px 10px rgba(20,45,70,.18)
}
.header-inner{max-width:1180px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
.title-wrap h1{margin:0;font-size:1.35rem;letter-spacing:2px}
.title-wrap p{margin:6px 0 0;font-size:.88rem;opacity:.9}
.teacher-btn{
  display:inline-flex;align-items:center;gap:7px;
  background:#fff;color:var(--primary-dark);
  text-decoration:none;font-weight:bold;
  border-radius:999px;padding:10px 15px;
  white-space:nowrap;box-shadow:0 2px 7px rgba(0,0,0,.12)
}
.teacher-btn:hover{background:#f5f8fb}
.container{max-width:1180px;margin:auto;padding:14px}
.nav-card{
  background:var(--card);border-radius:var(--radius);
  box-shadow:0 2px 8px rgba(25,50,75,.08);
  padding:12px;margin-bottom:12px
}
.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.tab{
  border:1.5px solid var(--border);
  background:#fff;color:var(--text);
  border-radius:13px;padding:13px 10px;
  font:inherit;font-weight:bold;cursor:pointer;
  transition:.18s;text-align:center
}
.tab small{display:block;margin-top:4px;color:var(--muted);font-weight:normal}
.tab:hover{border-color:#7da5c9;background:#f7fafc}
.tab.active{
  background:linear-gradient(135deg,#3d6f9f,#5d90bf);
  border-color:transparent;color:#fff;
  box-shadow:0 3px 10px rgba(49,95,143,.25)
}
.tab.active small{color:#eaf2f8}
.frame-card{
  background:var(--card);border-radius:var(--radius);
  overflow:hidden;box-shadow:0 2px 8px rgba(25,50,75,.08);
  min-height:calc(100vh - 190px)
}
iframe{
  display:block;width:100%;
  height:calc(100vh - 190px);
  min-height:720px;border:0;background:#fff
}
.loading{
  padding:28px;text-align:center;color:var(--muted)
}
footer{
  text-align:center;color:var(--muted);font-size:.8rem;
  padding:14px 10px 24px
}
@media(max-width:760px){
  .header-inner{align-items:flex-start}
  .title-wrap h1{font-size:1.16rem}
  .title-wrap p{font-size:.8rem}
  .teacher-btn{padding:8px 11px;font-size:.88rem}
  .tabs{grid-template-columns:1fr}
  .tab{padding:11px}
  iframe{height:calc(100vh - 300px);min-height:680px}
  .frame-card{min-height:680px}
}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="title-wrap">
      <h1>電機二乙 班級系統</h1>
      <p>請選擇要填寫的項目；三套系統共用同一個入口。</p>
    </div>
    <a class="teacher-btn" href="admin.html" target="_blank" rel="noopener">🔐 教師一鍵登入</a>
  </div>
</header>

<main class="container">
  <section class="nav-card">
    <div class="tabs" role="tablist" aria-label="班級系統功能">
      <button class="tab active" data-page="班級幹部評分表.html" data-key="score" role="tab">
        ⭐ 幹部評分
        <small>評分幹部表現與填寫原因</small>
      </button>
      <button class="tab" data-page="電機二乙幹部票選.html" data-key="vote" role="tab">
        🗳️ 幹部票選
        <small>選出各職位第一、第二人選</small>
      </button>
      <button class="tab" data-page="掃地工作志願序.html" data-key="sweep" role="tab">
        🧹 打掃志願序
        <small>選擇內外掃並排列志願</small>
      </button>
    </div>
  </section>

  <section class="frame-card">
    <div id="loading" class="loading">正在載入系統……</div>
    <iframe id="systemFrame" title="班級系統內容" src="班級幹部評分表.html"></iframe>
  </section>
</main>

<footer>學生請從本頁進入；教師後台請使用右上角「教師一鍵登入」。</footer>

<script>
const frame = document.getElementById("systemFrame");
const loading = document.getElementById("loading");
const tabs = [...document.querySelectorAll(".tab")];

function activateTab(tab, updateHash=true){
  tabs.forEach(t=>t.classList.toggle("active", t===tab));
  loading.style.display = "block";
  frame.style.display = "none";
  frame.src = tab.dataset.page;
  if(updateHash) history.replaceState(null,"","#"+tab.dataset.key);
}

tabs.forEach(tab=>{
  tab.addEventListener("click",()=>activateTab(tab));
});

frame.addEventListener("load",()=>{
  loading.style.display = "none";
  frame.style.display = "block";
  try{
    frame.style.height = Math.max(720, window.innerHeight - 190) + "px";
  }catch(e){}
});

const hash = location.hash.replace("#","");
const initial = tabs.find(t=>t.dataset.key===hash);
if(initial) activateTab(initial,false);
</script>
</body>
</html>
